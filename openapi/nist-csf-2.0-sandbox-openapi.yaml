  /organizations/{orgId}/gap-analysis:
    post:
      operationId: runGapAnalysis
      summary: Run a gap analysis between two profiles
      description: |
        Compares a **current** profile with a **target** profile and produces
        a function-by-function gap report with prioritized recommendations.
      tags:
      - Gap Analysis
      parameters:
      - $ref: '#/components/parameters/orgIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GapAnalysisRequest'
            examples:
              Default:
                summary: Acme current vs target
                value:
                  currentProfileId: prof-acme-cur-001
                  targetProfileId: prof-acme-tgt-001
                  includeRecommendations: true
      responses:
        '200':
          description: Gap analysis results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GapAnalysisResponse'
              examples:
                Default:
                  summary: Acme gap analysis result
                  value:
                    id: gap-acme-001
                    orgId: org-acme-001
                    currentProfileId: prof-acme-cur-001
                    targetProfileId: prof-acme-tgt-001
                    generatedAt: '2025-08-12T09:45:00Z'
                    overallCurrentTier: 2
                    overallTargetTier: 3
                    overallGap: 1
                    summary: Acme has significant gaps in Respond and Recover functions. Protect is closest to target. Governance
                      and identification require moderate uplift.
                    functionGaps:
                    - functionId: GV
                      functionName: Govern
                      currentTier: 2
                      targetTier: 3
                      gap: 1
                      priority: medium
                      findings:
                      - Cybersecurity policies exist but lack formal review cadence.
                      - Risk appetite statement needs board-level reaffirmation.
                      recommendations:
                      - id: rec-gv-01
                        title: Implement quarterly governance review cycle
                        description: Establish a formal quarterly review of cybersecurity policies with executive sign-off.
                        effort: medium
                        priority: high
                        estimatedCostUsd: 25000
                        timelineMonths: 3
                      - id: rec-gv-02
                        title: Formalize supply chain risk management
                        description: Develop and implement a third-party cybersecurity risk assessment program.
                        effort: high
                        priority: medium
                        estimatedCostUsd: 75000
                        timelineMonths: 6
                    - functionId: ID
                      functionName: Identify
                      currentTier: 2
                      targetTier: 3
                      gap: 1
                      priority: medium
                      findings:
                      - Asset discovery is periodic; shadow IT remains untracked.
                      - Risk assessments lack automation.
                      recommendations:
                      - id: rec-id-01
                        title: Deploy continuous asset discovery tooling
                        description: Implement automated network and cloud asset discovery scanning.
                        effort: medium
                        priority: high
                        estimatedCostUsd: 50000
                        timelineMonths: 4
                    - functionId: PR
                      functionName: Protect
                      currentTier: 3
                      targetTier: 3
                      gap: 0
                      priority: low
                      findings:
                      - Protection controls meet target; maintain current posture.
                      recommendations: []
                    - functionId: DE
                      functionName: Detect
                      currentTier: 2
                      targetTier: 3
                      gap: 1
                      priority: medium
                      findings:
                      - OT network segments lack monitoring coverage.
                      recommendations:
                      - id: rec-de-01
                        title: Extend SIEM coverage to OT networks
                        description: Deploy OT-specific sensors and integrate with central SIEM platform.
                        effort: high
                        priority: high
                        estimatedCostUsd: 120000
                        timelineMonths: 6
                    - functionId: RS
                      functionName: Respond
                      currentTier: 1
                      targetTier: 3
                      gap: 2
                      priority: critical
                      findings:
                      - Incident response plan has never been tested.
                      - No dedicated IR team; relies on ad-hoc assignments.
                      recommendations:
                      - id: rec-rs-01
                        title: Establish dedicated incident response team
                        description: Hire or assign 3-5 FTEs to a dedicated CSIRT with on-call rotation.
                        effort: high
                        priority: critical
                        estimatedCostUsd: 350000
                        timelineMonths: 6
                      - id: rec-rs-02
                        title: Conduct quarterly tabletop exercises
                        description: Design and execute scenario-based tabletop exercises with executive participation.
                        effort: low
                        priority: critical
                        estimatedCostUsd: 15000
                        timelineMonths: 2
                    - functionId: RC
                      functionName: Recover
                      currentTier: 1
                      targetTier: 2
                      gap: 1
                      priority: high
                      findings:
                      - No documented recovery playbooks.
                      - Backup restoration has never been tested end-to-end.
                      recommendations:
                      - id: rec-rc-01
                        title: Develop and test recovery playbooks
                        description: Document recovery procedures for top-10 critical systems and conduct annual DR exercises.
                        effort: medium
                        priority: high
                        estimatedCostUsd: 40000
                        timelineMonths: 4
                    totalEstimatedCostUsd: 675000
                    estimatedTimelineMonths: 12
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return "Default"
