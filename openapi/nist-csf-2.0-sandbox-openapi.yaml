        dispatcher: SCRIPT
        dispatcherRules: return "Default"
    post:
      operationId: createOrganization
      summary: Register a new organization
      tags:
      - Organizations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreate'
            examples:
              Default:
                summary: Register Acme Corporation
                value:
                  name: Acme Corporation
                  industry: Manufacturing
                  size: large
                  description: Global manufacturing conglomerate with IoT-driven production lines.
                  contactEmail: ciso@acme.example.com
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
              examples:
                Default:
                  summary: Acme Corporation created
                  value:
                    id: org-acme-001
                    name: Acme Corporation
                    industry: Manufacturing
                    size: large
                    description: Global manufacturing conglomerate with IoT-driven production lines.
                    contactEmail: ciso@acme.example.com
                    createdAt: '2025-01-15T09:30:00Z'
                    updatedAt: '2025-01-15T09:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Organization already exists
          content:
            application/json:
              schema:
