openapi: 3.1.0
info:
  title: NIST Cybersecurity Framework (CSF) 2.0 — Sandbox API
  version: 1.0.0
  description: |
    A **sandbox / simulation** API that lets enterprises report against the
    [NIST Cybersecurity Framework 2.0](https://www.nist.gov/cyberframework).

    ## Key Concepts

    | Concept | Description |
    |---------|-------------|
    | **Function** | Top-level outcome — Govern (GV), Identify (ID), Protect (PR), Detect (DE), Respond (RS), Recover (RC) |
    | **Category** | Group of related outcomes within a Function |
    | **Subcategory** | Specific technical / management outcome |
    | **Implementation Tier** | 1 – Partial · 2 – Risk Informed · 3 – Repeatable · 4 – Adaptive |
    | **Organizational Profile** | Snapshot of current or target cybersecurity posture |
    | **Assessment** | Evaluation of an organization against the CSF |
    | **Gap Analysis** | Comparison between Current and Target profiles |

    ## Microcks
    Every operation carries `examples` so the spec can be imported directly into
    [Microcks](https://microcks.io) for contract-first mocking.
  contact:
    name: NIST CSF 2.0 Sandbox
    url: https://example.com/nist-csf-sandbox
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
- url: https://sandbox.nist-csf.example.com/api/v1
  description: Sandbox server
- url: http://localhost:8080/api/v1
  description: Local development
tags:
- name: CSF Taxonomy
  description: Read-only NIST CSF 2.0 reference data — Functions, Categories, and Subcategories.
- name: Organizations
  description: Enterprise organizations registered in the NIST CSF 2.0 sandbox.
- name: Profiles
  description: Current-state and target-state organizational cybersecurity profiles.
- name: Assessments
  description: Cybersecurity posture assessments scored against organizational profiles.
- name: Gap Analysis
  description: Current-versus-target profile comparisons with prioritized remediation recommendations.
security:
- bearerAuth: []
paths:
  /csf/functions:
    get:
      operationId: listFunctions
      summary: List all CSF 2.0 Functions
      tags:
      - CSF Taxonomy
      responses:
        '200':
          description: All six CSF 2.0 functions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CsfFunction'
              examples:
                Default:
                  summary: All CSF 2.0 Functions
                  value:
                  - id: GV
                    name: Govern
                    description: Establish and monitor the organization's cybersecurity risk management strategy, expectations,
                      and policy.
                  - id: ID
                    name: Identify
                    description: Understand the organization's current cybersecurity risk posture.
                  - id: PR
                    name: Protect
                    description: Use safeguards to manage the organization's cybersecurity risks.
                  - id: DE
                    name: Detect
                    description: Find and analyze possible cybersecurity attacks and compromises.
                  - id: RS
                    name: Respond
                    description: Take action regarding a detected cybersecurity incident.
                  - id: RC
                    name: Recover
                    description: Restore assets and operations affected by a cybersecurity incident.
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return "Default"
  /csf/functions/{functionId}/categories:
    get:
      operationId: listCategories
      summary: List Categories for a given Function
      tags:
      - CSF Taxonomy
      parameters:
      - $ref: '#/components/parameters/functionIdPath'
      responses:
        '200':
          description: Categories belonging to the function
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CsfCategory'
              examples:
                Default:
                  summary: Govern (GV) categories
                  value:
                  - id: GV.OC
                    functionId: GV
                    name: Organizational Context
                    description: The circumstances — mission, stakeholder expectations, dependencies, and legal, regulatory,
                      and contractual requirements — surrounding the organization's cybersecurity risk management decisions
                      are understood.
                  - id: GV.RM
                    functionId: GV
                    name: Risk Management Strategy
                    description: The organization's priorities, constraints, risk tolerance and appetite statements, and assumptions
                      are established, communicated, and used to support operational risk decisions.
                  - id: GV.RR
                    functionId: GV
                    name: Roles, Responsibilities, and Authorities
                    description: Cybersecurity roles, responsibilities, and authorities to foster accountability, performance
                      assessment, and continuous improvement are established and communicated.
                  - id: GV.PO
                    functionId: GV
                    name: Policy
                    description: Organizational cybersecurity policy is established, communicated, and enforced.
                  - id: GV.OV
                    functionId: GV
                    name: Oversight
                    description: Results of organization-wide cybersecurity risk management activities and performance are
                      used to inform, improve, and adjust the risk management strategy.
                  - id: GV.SC
                    functionId: GV
                    name: Cybersecurity Supply Chain Risk Management
                    description: Cyber supply chain risk management processes are identified, established, managed, monitored,
                      and improved by organizational stakeholders.
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return "Default"
  /csf/categories/{categoryId}/subcategories:
    get:
      operationId: listSubcategories
      summary: List Subcategories for a given Category
      tags:
      - CSF Taxonomy
      parameters:
      - name: categoryId
        in: path
        required: true
        schema:
          type: string
        example: GV.OC
      responses:
        '200':
          description: Subcategories belonging to the category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CsfSubcategory'
              examples:
                Default:
                  summary: GV.OC subcategories
                  value:
                  - id: GV.OC-01
                    categoryId: GV.OC
                    name: Organizational mission is understood and informs cybersecurity risk management
                    description: The organizational mission is understood and informs cybersecurity risk management.
                  - id: GV.OC-02
                    categoryId: GV.OC
                    name: Internal and external stakeholders are understood
                    description: Internal and external stakeholders are understood, and their needs and expectations regarding
                      cybersecurity risk management are understood and considered.
                  - id: GV.OC-03
                    categoryId: GV.OC
                    name: Legal, regulatory, and contractual requirements are understood
                    description: Legal, regulatory, and contractual requirements regarding cybersecurity — including privacy
                      and civil liberties obligations — are understood and managed.
                  - id: GV.OC-04
                    categoryId: GV.OC
                    name: Critical objectives and dependencies are understood
                    description: Critical objectives, capabilities, and services that external stakeholders depend on or expect
                      from the organization are understood and communicated.
                  - id: GV.OC-05
                    categoryId: GV.OC
                    name: Outcomes and dependencies for the organization are understood
                    description: Outcomes, capabilities, and services that the organization depends on are understood and
                      communicated.
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: return "Default"
