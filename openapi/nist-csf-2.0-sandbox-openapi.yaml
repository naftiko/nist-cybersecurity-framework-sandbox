components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Sandbox JWT — use `Authorization: Bearer sandbox-token-acme-001` for testing.'
  parameters:
    orgIdPath:
      name: orgId
      in: path
      required: true
      schema:
        type: string
      example: org-acme-001
    profileIdPath:
      name: profileId
      in: path
      required: true
      schema:
        type: string
      example: prof-acme-cur-001
    functionIdPath:
      name: functionId
      in: path
      required: true
      schema:
        type: string
        enum:
        - GV
        - ID
        - PR
        - DE
        - RS
        - RC
      example: GV
    limitQuery:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    offsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Default:
              value:
                code: BAD_REQUEST
                message: 'Validation failed: ''name'' is required.'
                details:
                - field: name
                  issue: must not be blank
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Default:
              value:
                code: NOT_FOUND
                message: The requested resource was not found.
  schemas:
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              issue:
                type: string
    CsfFunction:
      type: object
      required:
      - id
      - name
      - description
      properties:
        id:
          type: string
          description: Function code (GV, ID, PR, DE, RS, RC)
          enum:
          - GV
          - ID
          - PR
          - DE
          - RS
          - RC
        name:
          type: string
        description:
          type: string
    CsfCategory:
      type: object
      required:
      - id
      - functionId
      - name
      - description
      properties:
        id:
          type: string
          description: Category code, e.g. GV.OC
        functionId:
          type: string
        name:
          type: string
        description:
          type: string
    CsfSubcategory:
      type: object
      required:
      - id
      - categoryId
      - name
      - description
      properties:
        id:
          type: string
          description: Subcategory code, e.g. GV.OC-01
        categoryId:
          type: string
        name:
          type: string
        description:
          type: string
    OrganizationCreate:
      type: object
      required:
      - name
      - industry
      - size
      properties:
        name:
          type: string
        industry:
          type: string
        size:
          type: string
          enum:
          - small
          - medium
          - large
          - enterprise
        description:
          type: string
        contactEmail:
          type: string
          format: email
    Organization:
      allOf:
      - $ref: '#/components/schemas/OrganizationCreate'
      - type: object
        required:
        - id
        - createdAt
        - updatedAt
        properties:
          id:
            type: string
          createdAt:
            type: string
            format: date-time
          updatedAt:
            type: string
            format: date-time
    OrganizationListResponse:
      type: object
      required:
      - total
      - limit
      - offset
      - items
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
    ImplementationTier:
      type: integer
